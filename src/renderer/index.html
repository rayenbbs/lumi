<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' blob: data: mediastream:; connect-src * blob: data:; media-src * blob: data: mediastream:; worker-src * blob:;" />
    <title>Lumi</title>
    <script>
      // Suppress WebGazer's noisy console logs
      const _consoleWarn = console.warn;
      console.warn = (...args) => {
        if (args[0] && typeof args[0] === 'string' && args[0].includes('webgazer')) return;
        _consoleWarn.apply(console, args);
      };
    </script>
    <!-- WebGazer 3.5.3 (patched: face mesh assets load from CDN) -->
    <script src="/webgazer.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
