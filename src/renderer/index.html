<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' blob: data: https://cdn.jsdelivr.net; connect-src 'self' http://localhost:* https://cdn.jsdelivr.net blob: data:; media-src 'self' blob: data:" />
    <title>Lumi</title>
    <!-- WebGazer (optional): loaded from CDN for hackathon convenience. If it fails, eye tracking is disabled gracefully. -->
    <script defer src="https://cdn.jsdelivr.net/npm/webgazer@3.5.3/dist/webgazer.js"></script>
    <script>
      // Suppress WebGazer's noisy console logs
      const _consoleWarn = console.warn;
      console.warn = (...args) => {
        if (args[0] && typeof args[0] === 'string' && args[0].includes('webgazer')) return;
        _consoleWarn.apply(console, args);
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
